<div class="recovery">
  <h2 class="recovery__title">პაროლის აღდგენა</h2>

  @if(isSuccess()) {
    <div class="recovery__success">
      ✅ პაროლის აღდგენის ინსტრუქცია გაგზავნილია ელ-ფოსტაზე!
    </div>
  } @else {
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="recovery__field">
        <label>ელ-ფოსტა</label>
        <input type="email" formControlName="email" placeholder="example@mail.com"/>
        @if(form.get('email')?.invalid && form.get('email')?.touched) {
          <span class="recovery__error">შეიყვანე სწორი ელ-ფოსტა</span>
        }
      </div>

      @if(errorMessage()) {
        <div class="recovery__error-box">{{ errorMessage() }}</div>
      }

      <button type="submit" class="recovery__btn" [disabled]="form.invalid || isLoading()">
        {{ isLoading() ? 'იტვირთება...' : 'გაგზავნა' }}
      </button>
    </form>
  }
</div>
