
<div class="home">
  <button class="home__filter-toggle" (click)="isFilterOpen.set(!isFilterOpen())">
    ☰ ფილტრაცია {{ isFilterOpen() ? '▲' : '▼' }}
  </button>

  <div class="home__content">
    <aside class="home__filters" [class.home__filters--open]="isFilterOpen()">
      <app-filters
        [categories]="categories()"
        [brands]="brands()"
        (filterChange)="onFilterChange($event)"
      ></app-filters>
    </aside>

    <main class="home__main">
      @if(showCarousel()) {
        <app-carousel [products]="popularProducts()"></app-carousel>
      }

      @if(isLoading()) {
        <div class="home__loading">
          <p>იტვირთება...</p>
        </div>
      } @else {
        <app-product-list [products]="products()"></app-product-list>
        <app-pagination
          [currentPage]="currentPage()"
          [totalPages]="totalPages()"
          (pageChange)="onPageChange($event)"
        ></app-pagination>
      }
    </main>
  </div>
</div>
