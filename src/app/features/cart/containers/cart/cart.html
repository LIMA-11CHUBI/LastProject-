<div class="cart">
  <div class="cart__container">
    <h2 class="cart__title">კალათა</h2>

    @if(isLoading()) {
      <div class="cart__loading">იტვირთება...</div>
    } @else if(cart() && cart()!.products.length > 0) {
      <div class="cart__content">
        <div class="cart__items">
          @for(item of cart()!.products; track item.productId) {
            <app-cart-item
              [item]="item"
              (updateQuantity)="onUpdateQuantity($event)"
              (deleteItem)="onDeleteItem($event)"
            ></app-cart-item>
          }
          <button class="cart__clear" (click)="onClearCart()">
            კალათის გასუფთავება
          </button>
        </div>
        <div class="cart__sidebar">
          <app-cart-summary
            [cart]="cart()!"
            (checkout)="onCheckout()"
          ></app-cart-summary>
        </div>
      </div>
    } @else {
      <div class="cart__empty">
        <p>კალათა ცარიელია 🛒</p>
        <button (click)="goShopping()">შოპინგის გაგრძელება</button>
      </div>
      
    }

  </div>
</div>
