<div class="product-card" [routerLink]="['/product', product._id]">
  <div class="product-card__image">
    <img [src]="product.thumbnail" [alt]="product.title" />
    <button
      class="product-card__favorite"
      (click)="toggleFavorite($event)"
      [class.product-card__favorite--active]="isFavorite()"
    >
      @if(isFavorite()) {
        <i class="bi bi-heart-fill"></i>
      } @else {
        <i class="bi bi-heart"></i>
      }
    </button>
  </div>

  <div class="product-card__info">
    <h3 class="product-card__title">{{ product.title }}</h3>
    <p class="product-card__brand">{{ product.brand }}</p>

    <div class="product-card__rating">
      <span><i class="bi bi-star-fill"></i></span>
      <span>{{ product.rating }}</span>
    </div>

    <div class="product-card__price">
      @if(product.price.discountPercentage > 0) {
        <span class="product-card__price--old">
          {{ product.price.beforeDiscount }} {{ product.price.currency }}
        </span>
        <span class="product-card__price--discount">
          -{{ product.price.discountPercentage }}%
        </span>
      }
      <span class="product-card__price--current">
        {{ product.price.current }} {{ product.price.currency }}
      </span>
    </div>

    <button
      class="product-card__cart"
      (click)="addToCart($event)"
      [disabled]="isAddingToCart() || product.stock === 0"
    >
      @if(product.stock === 0) {
        მარაგი ამოწურულია
      } @else if(isAddingToCart()) {
        ...
      } @else {
        <i class="bi bi-cart-fill"></i> კალათაში
      }
    </button>
  </div>
</div>
