<nav class="navbar">
  <div class="navbar__brand">
    <a routerLink="/">MyShop</a>
  </div>

  <div class="navbar__links">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">მთავარი</a>
    <a routerLink="/quotes" routerLinkActive="active">ციტატები</a>
    <a routerLink="/qrcode" routerLinkActive="active">QR კოდი</a>
    <a routerLink="/admin" routerLinkActive="active">ადმინი</a>
  </div>

  <div class="navbar__search">
    <input
      type="text"
      placeholder="ძებნა..."
      [formControl]="searchControl"
      (keyup.enter)="onSearch()"
    />
    <button (click)="onSearch()"><i class="bi bi-search"></i></button>
  </div>

 <div class="navbar__profile">


    <button class="navbar__profile-btn" (click)="toggleDropdown()">
  @if(authService.currentUser()?.avatar) {
    <img [src]="authService.currentUser()?.avatar" alt="profile" />
  } @else {
    <i class="bi bi-person-circle"></i>
  }
</button>

    @if(isDropdownOpen) {
      <div class="navbar__dropdown">
        @if(authService.currentUser()) {
          <a routerLink="/profile" (click)="isDropdownOpen = false">პროფილი</a>
          <a routerLink="/cart" (click)="isDropdownOpen = false">კალათა</a>
          <button (click)="logout()">გასვლა</button>
        } @else {
          <a routerLink="/auth" (click)="isDropdownOpen = false">შესვლა / რეგისტრაცია</a>
        }
      </div>
    }
  </div>

  <button class="navbar__hamburger" (click)="toggleMobileMenu()">
    <span></span>
    <span></span>
    <span></span>
  </button>
</nav>

<div class="navbar__mobile-menu" [class.open]="isMobileMenuOpen">
  <div class="navbar__mobile-search">
    <input
      type="text"
      placeholder="ძებნა..."
      [formControl]="searchControl"
      (keyup.enter)="onSearch(); isMobileMenuOpen = false"
    />
    <button (click)="onSearch(); isMobileMenuOpen = false"><i class="bi bi-search"></i></button>
  </div>
  <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="isMobileMenuOpen = false">მთავარი</a>
  <a routerLink="/quotes" routerLinkActive="active" (click)="isMobileMenuOpen = false">ციტატები</a>
  <a routerLink="/qrcode" routerLinkActive="active" (click)="isMobileMenuOpen = false">QR კოდი</a>
  <a routerLink="/echo" routerLinkActive="active" (click)="isMobileMenuOpen = false">Echo</a>
  <a routerLink="/admin" routerLinkActive="active" (click)="isMobileMenuOpen = false">ადმინი</a>
  @if(authService.currentUser()) {
    <a routerLink="/profile" (click)="isMobileMenuOpen = false">პროფილი</a>
    <a routerLink="/cart" (click)="isMobileMenuOpen = false">კალათა</a>
    <button (click)="logout(); isMobileMenuOpen = false">გასვლა</button>
  } @else {
    <a routerLink="/auth" (click)="isMobileMenuOpen = false">შესვლა / რეგისტრაცია</a>
  }
</div>
